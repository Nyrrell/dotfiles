[org/gnome/desktop/input-sources]
mru-sources=[('xkb', 'us'), ('xkb', 'fr')]
per-window=true
sources=[('xkb', 'fr')]
xkb-options=['lv3:ralt_switch']

[org/gnome/desktop/interface]
accent-color='blue'
color-scheme='prefer-dark'
document-font-name='JetBrains Mono 11'
font-name='JetBrains Mono 11'
monospace-font-name='Adwaita Mono 11'
text-scaling-factor=0.97999999999999998

[org/gnome/desktop/session]
idle-delay=uint32 600

[org/gnome/desktop/wm/preferences]
button-layout='appmenu:close'

[org/gnome/nautilus/icon-view]
default-zoom-level='small'

[org/gnome/nautilus/list-view]
default-column-order=['name', 'size', 'type', 'owner', 'group', 'permissions', 'date_modified', 'date_accessed', 'date_created', 'recency', 'detailed_type']
default-visible-columns=['name', 'size', 'permissions', 'date_modified']
use-tree-view=false

[org/gnome/settings-daemon/plugins/color]
night-light-schedule-automatic=false

[org/gnome/shell]
disabled-extensions=['window-list@gnome-shell-extensions.gcampax.github.com', 'screenshot-window-sizer@gnome-shell-extensions.gcampax.github.com', 'places-menu@gnome-shell-extensions.gcampax.github.com', 'native-window-placement@gnome-shell-extensions.gcampax.github.com', 'status-icons@gnome-shell-extensions.gcampax.github.com', 'windowsNavigator@gnome-shell-extensions.gcampax.github.com', 'unite@hardpixel.eu', 'light-style@gnome-shell-extensions.gcampax.github.com']
enabled-extensions=['apps-menu@gnome-shell-extensions.gcampax.github.com', 'Bluetooth-Battery-Meter@maniacx.github.com', 'system-monitor@gnome-shell-extensions.gcampax.github.com', 'caffeine@patapon.info', 'quick-settings-tweaks@qwreey', 'launcher@hedgie.tech']
favorite-apps=['firefox.desktop', 'org.gnome.Console.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.TextEditor.desktop', 'org.gnome.Calculator.desktop']

[org/gnome/shell/extensions/Bluetooth-Battery-Meter]
color-10='#ff7800'
color-100='#15c931'
color-20='#ff7800'
color-30='#15c931'
color-40='#15c931'
color-50='#15c931'
color-60='#15c931'
color-70='#15c931'
color-80='#15c931'
color-90='#15c931'
enable-battery-level-text=false
level-indicator-color=0
level-indicator-type=0
swap-icon-text=false

[org/gnome/shell/extensions/caffeine]
cli-toggle=true
enable-mpris=true
indicator-position-max=1
nightlight-control='for-apps'
show-notifications=false
show-toggle=true
user-enabled=false

[org/gnome/shell/extensions/launcher]
notify=false
path='/home/USER/.local/share/bin'
strip=true

[org/gnome/shell/extensions/quick-settings-tweaks]
datemenu-hide-left-box=true
menu-animation-enabled=false
overlay-menu-enabled=false
system-indicator-layout-enabled=false
system-indicator-screen-recording-indicator-use-accent=false
volume-mixer-enabled=true
weather-enabled=false

[org/gnome/shell/extensions/unite]
autofocus-windows=true
enable-titlebar-actions=true
extend-left-box=false
hide-activities-button='always'
hide-app-menu-icon=false
hide-window-titlebars='always'
notifications-position='center'
reduce-panel-spacing=false
restrict-to-primary-screen=true
show-appmenu-button=true
show-desktop-name=true
show-legacy-tray=false
show-window-buttons='always'
show-window-title='both'
use-activities-text=false

[org/gnome/shell/keybindings]
show-screenshot-ui=['<Shift><Super>s']

[org/gnome/tweaks]
show-extensions-notice=false

